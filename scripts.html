  <script>
    // ════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════
    let _data = null;
    let _sortCol = '';
    let _sortDir = 1;
    let _stagingOk = false;
    let _activities = [];
    let _activityEditId = null;
    let _actPage = 1;
    let _actTotalPages = 1;
    let _actPageSize = 20;
    let _actQuery = '';
    let _sourceRef = null;

    // ════════════════════════════════════════════════
    //  AUTH
    // ════════════════════════════════════════════════


    // ════════════════════════════════════════════════
    //  NAVIGATION
    // ════════════════════════════════════════════════
    function switchTab(id, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      btn.classList.add('active');
      if (id === 'logs') loadLogs();
      if (id === 'admin' || id === 'activities') loadActivities();
      if (id === 'plan') { loadAdminMappings(); loadPlanData(); }
    }

    function switchTabById(id) {
      const btn = document.querySelector(`.nav-btn[onclick*="switchTab('${id}'"]`);
      if (btn) switchTab(id, btn);
    }

    // ── Dashboard sub-tab switcher ──
    const _DASH_PANELS = ['overview','recon','strategic','group','admin'];
    function switchDashTab(name) {
      _DASH_PANELS.forEach(n => {
        const panel = document.getElementById('dshpanel-' + n);
        const btn   = document.getElementById('dshtab-btn-' + n);
        if (panel) panel.style.display = n === name ? '' : 'none';
        if (btn)   btn.classList.toggle('active', n === name);
      });
    }

    // ════════════════════════════════════════════════
    //  LOADING
    // ════════════════════════════════════════════════
    function showLoading(msg) {
      document.getElementById('loading').classList.add('show');
      document.getElementById('loading-msg').textContent = msg || 'กำลังโหลด...';
    }
    function hideLoading() {
      document.getElementById('loading').classList.remove('show');
    }

    // ════════════════════════════════════════════════
    //  DATA LOAD
    // ════════════════════════════════════════════════
    const _selectedYear = 2569;

    function loadDashboard() {
      showLoading('กำลังโหลดข้อมูล ปีงบ 2569...');
      google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          if (!res) {
            // ถ้าตอบกลับเป็น null ให้ลองเรียก debug/identify เพื่อบอกขั้นที่พัง
            google.script.run
              .withSuccessHandler(diag => {
                const msg = diag && !diag.success
                  ? `ไม่ได้รับข้อมูลจาก server (null response)\nตรวจพบจุดผิดพลาด: ${diag.step || '-'}\n${diag.message || ''}`
                  : 'ไม่ได้รับข้อมูลจาก server (null response)';
                showError(msg);
              })
              .withFailureHandler(err => { showError('ไม่ได้รับข้อมูลจาก server (null response) — diagnose failed: ' + (err.message || String(err))); })
              .identifyDashboardFailure(_selectedYear);
            return;
          }
          if (!res.success) { showError(res.message || 'getDashboardData failed'); return; }
          _data = res;
          renderAll(res);
          initActivitySourceOptions();
        })
        .withFailureHandler(err => {
          hideLoading();
          showError('GAS Error: ' + (err.message || String(err)));
        })
        .getDashboardData(_selectedYear);
    }

    function refreshData() { loadDashboard(); }

    function renderAll(res) {
      if (!res || !res.summary) { console.error('renderAll: invalid res', res); return; }
      const s = res.summary;
      const _set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      const _setStyle = (id, prop, val) => { const el = document.getElementById(id); if (el) el.style[prop] = val; };
      const _setAttr = (id, attr, val) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, val); };

      _set('last-update', s.lastUpdate);
      _set('fiscal-year-label', '2569');

      // KPIs
      _set('kpi-allocated', fmt(s.allocated));
      _set('kpi-paid', fmt(s.paid));

      const kpiGfmis = document.getElementById('kpi-gfmis-recon');
      if (kpiGfmis) {
        const diff = Number(s.gfmisReconDiff || 0);
        if (diff <= 1) {
          kpiGfmis.innerHTML = 'บาท · <span style="color:var(--green)"><i class="fas fa-check-circle"></i> ตรงกับ GFMIS</span>';
        } else {
          kpiGfmis.innerHTML = `บาท · <span style="color:var(--rose)" title="GFMIS A–F รวม=${fmt(s.gfmisPaid)} | DS6 A–F=${fmt(s.activityPaidTotal)}"><i class="fas fa-exclamation-triangle"></i> ต่างจาก GFMIS ${fmt(diff)}</span>`;
        }
      }

      _set('kpi-po', fmt(s.reserved || 0));
      _set('kpi-remaining', fmt(s.remaining));
      _set('kpi-gfmis-paid', fmt(s.grandPaid));
      _set('kpi-gfmis-alloc', fmt(s.grandAlloc));
      _set('kpi-rows', s.rowCount);

      // Type breakdown bars (A–F จาก walletBreakdown)
      const total = s.allocated || 1;
      const wbMap = {};
      (res.walletBreakdown || []).forEach(w => { wbMap[w.wtype] = w; });
      const wtColorMap = { A:'#2457a0', B:'#7c3aed', C:'#0d9488', D:'#d97706', E:'#64748b', F:'#b45309' };
      const types = ['A','B','C','D','E','F'].map(k => ({
        label: `${k} ${(wbMap[k]&&wbMap[k].short)||k}`,
        alloc: wbMap[k] ? wbMap[k].alloc : 0,
        paid:  wbMap[k] ? wbMap[k].paid  : 0,
        color: wtColorMap[k],
      }));
      const bd = document.getElementById('type-breakdown');
      bd.innerHTML = '';
      types.forEach(t => {
        const pct = t.alloc > 0 ? (t.paid / t.alloc * 100).toFixed(1) : 0;
        const wPct = (t.alloc / total * 100).toFixed(1);
        bd.insertAdjacentHTML('beforeend', `
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:130px;font-size:12px;color:var(--text-dim);flex-shrink:0">${t.label}</div>
        <div style="flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${Math.min(pct, 100)}%;background:${t.color};border-radius:99px;transition:width .8s ease"></div>
        </div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);min-width:80px;text-align:right">
          ${fmt(t.paid)} <span style="color:var(--text-dim)">(${pct}%)</span>
        </div>
        <div style="font-size:11px;color:var(--text-dim);min-width:60px;text-align:right">${wPct}% ของงบ</div>
      </div>`);
      });

      // Ring
      const pct = s.paidPct || 0;
      const target = s.targetPct || 0;
      const circ = 314;
      _set('ring-pct-text', pct.toFixed(1) + '%');
      _setStyle('ring-paid', 'strokeDashoffset', circ - (circ * Math.min(pct, 100) / 100));
      _setStyle('ring-target', 'strokeDashoffset', circ - (circ * Math.min(target, 100) / 100));
      const paidColor = pct >= target ? '#0d9488' : pct >= target - 10 ? '#d97706' : '#e11d48';
      _setAttr('ring-paid', 'stroke', paidColor);
      _setStyle('pbar-paid', 'width', Math.min(pct, 100) + '%');
      _setStyle('pbar-target', 'width', Math.min(target, 100) + '%');
      _set('pbar-paid-val', pct.toFixed(1) + '%');
      _set('pbar-target-val', target + '%');
      let recon = '';
      if (s.adminPaidMode === 'ds6' && s.activityPaidTotal != null && s.ds5PaidSum != null) {
        const d = Math.abs(Number(s.activityPaidTotal) - Number(s.ds5PaidSum));
        if (d > 1) {
          recon = ` · ⚠️ เบิกจ่าย DS6 รวม ${fmt(s.activityPaidTotal)} กับสายบริหาร DS5 ${fmt(s.ds5PaidSum)} ต่างกัน (ชื่อสายบริหารใน DS6 อาจไม่ตรงกับ DS5)`;
        }
      }
      if (s.ds5AllocSum != null && s.opTotalFromA != null) {
        const d2 = Math.abs(Number(s.ds5AllocSum) - Number(s.opTotalFromA));
        if (d2 > 1) {
          recon += ` · ⚠️ จัดสรร DS5 ${fmt(s.ds5AllocSum)} กับ งบ A ใน DS2 ${fmt(s.opTotalFromA)} ต่างกัน (ลองกดรีเคลค์ DS5 หรือตรวจ override)`;
        }
      }
      const linePaidShow = (s.ds5PaidDisplaySum != null && s.ds5PaidDisplaySum !== '')
        ? s.ds5PaidDisplaySum
        : (s.ds5PaidSum != null ? s.ds5PaidSum : '-');
      const modeNote = s.adminPaidMode === 'gfmis_prorata'
        ? ' · สายบริหาร: แบ่งเบิกจ่าย GFMIS (งบ A) ตามสัดส่วนจัดสรร (ยังไม่มีกันเงิน DS6)'
        : '';
      _set('progress-desc', `เบิกจ่ายสะสม (A+B+C+D) ${fmt(s.paid)} บาท จาก ${fmt(s.allocated)} บาท · เป้าเดือน ${s.targetMonth}: ${target}% · รวมตามสาย ${fmt(linePaidShow)}${modeNote}${recon}`);

      // Chart: admin=DS5 สายบริหาร (Panel 2); group chart rendered in renderStrategicPanel (Panel 3)
      renderSimpleChart('chart-admin', res.adminSummary, target);

      // งบลงทุน section (Type C/F)
      renderInvestment(res.bInvestment);

      // เบิกแทนกัน note (Type D)
      _set('reconcile-total', fmt(s.reconcileTotal));

      // Panel 1 — Monthly Trend (reuse exec trend renderer for #dash-trend)
      renderTrendBars('dash-trend', res.monthlyTrend, target);

      // Panel 2 — Recon panel
      renderReconPanel(res);

      // Panel 3 — Strategic Progress
      renderStrategicPanel(res);

      // Tables
      renderGroupTable(res.adminSummary, target);
      renderDetailTable(res.tableRows);
      // Other tabs
      renderAdminTab(res);
      renderTransferTab(res);
      renderExecDashboard(res);

      // Update current round info
      updateCurrentRoundInfo();

      _set('detail-meta', `แสดง ${res.tableRows.length} รายการ (A+B+C) · อัปเดต ${s.lastUpdate}`);
    }

    // ════════════════════════════════════════════════
    //  EXEC DASHBOARD — สรุปผู้บริหาร
    // ════════════════════════════════════════════════
    function renderExecDashboard(res) {
      if (!res || !res.summary) return;
      const s = res.summary;
      const target = s.targetPct || 0;
      const _el = id => document.getElementById(id);
      const _setTxt = (id, v) => { const e = _el(id); if (e) e.textContent = v; };

      _setTxt('exec-fy', '2569');
      _setTxt('exec-update', s.lastUpdate || '-');

      // KPI 4 ไพเด่น
      const pct = s.paidPct || 0;
      const kpiClr = pct >= target ? 'var(--green)' : pct >= target - 10 ? 'var(--amber)' : 'var(--rose)';
      const kpiEl = _el('exec-kpi');
      if (kpiEl) kpiEl.innerHTML = [
        { label: 'งบดำเนินงาน (A+B+C+D)', val: fmt(s.allocated), color: 'var(--navy)', sub: '' },
        { label: 'ยอด PO / กันเงิน (DS6)', val: fmt(s.reserved || 0), color: '#7c3aed', sub: 'ทุกสถานะ ยกเว้น ยกเลิก' },
        { label: 'เบิกจ่ายสะสม (DS6)', val: fmt(s.paid), color: 'var(--teal)', sub: 'สถานะ: เบิกจ่ายแล้ว' },
        { label: '% เบิกจ่าย', val: pct.toFixed(1) + '%', color: kpiClr, sub: 'เป้า ' + target + '%' },
      ].map(k => `
    <div style="background:var(--surface);border-radius:var(--radius);padding:20px 22px;
         box-shadow:var(--shadow);border:1px solid var(--border);border-top:3px solid ${k.color}">
      <div style="font-size:12px;color:var(--text-dim);font-weight:500;margin-bottom:8px">${k.label}</div>
      <div style="font-size:22px;font-weight:700;color:${k.color};font-family:'IBM Plex Mono',monospace">${k.val}</div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${k.sub || ''}</div>
    </div>`).join('');

      // Monthly Trend bars — use shared renderer
      renderTrendBars('exec-trend', res.monthlyTrend, target);

      // Pool Cards — แสดงงบรวม 3 กลุ่ม: ดำเนินงาน (A+B+C+D) / บุคลากร (E) / ลงทุน (F)
      const pcEl = _el('exec-pool-cards');
      if (pcEl && res.walletBreakdown && res.walletBreakdown.length) {
        pcEl.innerHTML = '';
        const wbAll = {};
        res.walletBreakdown.forEach(w => { wbAll[w.wtype] = w; });
        const opAlloc = ['A','B','C','D'].reduce((s,k) => s + (wbAll[k]?wbAll[k].alloc:0), 0);
        const opPaid  = ['A','B','C','D'].reduce((s,k) => s + (wbAll[k]?wbAll[k].paid:0), 0);
        const opPct   = opAlloc > 0 ? opPaid/opAlloc*100 : 0;
        const eW = wbAll['E'] || { alloc:0, paid:0, pct:0 };
        const fW = wbAll['F'] || { alloc:0, paid:0, pct:0 };
        [
          { label:'งบดำเนินงาน (A+B+C+D)', sub:`รายงานกรม รบจ. ทุกวันที่ 15`, alloc:opAlloc, paid:opPaid, pct:opPct, color:'#2457a0', isRBJ:true },
          { label:'งบบุคลากร (E)', sub:'เงินเดือน / ค่าตอบแทน', alloc:eW.alloc, paid:eW.paid, pct:eW.pct, color:'#64748b', isRBJ:false },
          { label:'งบลงทุน (F)', sub:'ครุภัณฑ์ / สิ่งก่อสร้าง', alloc:fW.alloc, paid:fW.paid, pct:fW.pct, color:'#b45309', isRBJ:false },
        ].forEach(p => {
          const pc = p.pct || 0;
          const clr = p.isRBJ
            ? (pc >= target ? 'var(--green)' : pc >= target-10 ? 'var(--amber)' : 'var(--rose)')
            : '#64748b';
          pcEl.insertAdjacentHTML('beforeend', `
        <div class="chart-card" style="padding:18px 20px;border-top:3px solid ${p.color}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--navy)">${p.label}</div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${p.sub}</div>
            </div>
            <div style="font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${clr}">${pc.toFixed(1)}%</div>
          </div>
          <div style="height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:8px">
            <div style="height:100%;width:${Math.min(pc,100)}%;background:${p.isRBJ?clr:p.color};border-radius:99px;opacity:0.7;transition:width .8s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim)">
            <span>จัดสรร ${fmt(p.alloc)}</span><span>เบิก ${fmt(p.paid)}</span>
          </div>
          ${p.isRBJ ? `<div style="font-size:10px;color:var(--green);margin-top:6px;font-weight:600">● นับใน % รบจ. · เป้า ${target}%</div>` : ''}
        </div>`);
        });
      }

      // ════ Wallet Breakdown A–F ════
      const walletTbody = _el('exec-wallet-tbody');
      const walletTfoot = _el('exec-wallet-tfoot');
      const rbjPctEl    = _el('exec-rbj-pct');
      const rbjTgtEl    = _el('exec-rbj-target');
      const rbjGauge    = _el('exec-rbj-gauge');

      if (walletTbody && res.walletBreakdown && res.walletBreakdown.length) {
        const rows = res.walletBreakdown.filter(w => w.wtype !== 'X' || w.alloc > 0);
        let rbjAlloc = 0, rbjPaid = 0, rbjPaidDS6 = 0, totalAlloc = 0;

        walletTbody.innerHTML = rows.map(w => {
          const pctG  = w.pct    || 0;   // % จาก GFMIS
          const pctD  = w.pctDS6 || 0;   // % จาก DS6
          // ใช้ GFMIS เป็นหลักสำหรับ bar + สี (ถ้ายังไม่มี DS6)
          const pctBar = pctG > 0 ? pctG : pctD;
          const barClr = pctBar >= target ? '#0d9488' : pctBar >= target - 10 ? '#d97706' : '#e11d48';
          const rbjMark = w.inRBJ
            ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#0d9488;vertical-align:middle" title="นับรวมใน % รบจ."></span>`
            : `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#e2e8f0;vertical-align:middle" title="ไม่นับใน รบจ."></span>`;
          if (w.inRBJ) { rbjAlloc += w.alloc; rbjPaid += w.paidGFMIS; rbjPaidDS6 += w.paidDS6; }
          totalAlloc += w.alloc;

          // diff badge ระหว่าง 2 แหล่ง
          const diff = (w.paidGFMIS || 0) - (w.paidDS6 || 0);
          const diffAbs = Math.abs(diff);
          const diffBadge = diffAbs > 0 && w.alloc > 0
            ? `<span style="font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;background:${diffAbs/w.alloc > 0.05?'#fff5f5':'#f1f5f9'};color:${diffAbs/w.alloc > 0.05?'#b91c1c':'#94a3b8'}" title="ผลต่าง GFMIS − กันเงิน">Δ ${fmt(diffAbs)}</span>`
            : '';

          return `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:8px 10px">
              <span style="display:inline-block;min-width:26px;text-align:center;padding:3px 7px;border-radius:6px;font-weight:800;font-size:13px;background:${w.bg||'#f1f5f9'};color:${w.color||'#475569'}">${w.wtype}</span>
            </td>
            <td style="padding:8px 10px">
              <div style="font-weight:600;color:var(--navy)">${w.label}</div>
              <div style="font-size:11px;color:var(--text-dim)">${w.short}${w.count > 0 ? ` · ${w.count} รหัสงบ` : ''}${diffBadge}</div>
            </td>
            <td style="padding:8px 10px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px">${fmt(w.alloc)}</td>
            <td style="padding:8px 10px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2457a0;font-weight:600">
              ${fmt(w.paidGFMIS)}
              <div style="font-size:10px;color:${w.inRBJ?barClr:'#94a3b8'};font-weight:400">${pctG.toFixed(1)}%</div>
            </td>
            <td style="padding:8px 10px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#0d9488;font-weight:600">
              ${fmt(w.paidDS6)}
              <div style="font-size:10px;color:${w.inRBJ?barClr:'#94a3b8'};font-weight:400">${pctD.toFixed(1)}%</div>
            </td>
            <td style="padding:8px 10px">
              <div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;height:10px;background:#f1f5f9;border-radius:99px;overflow:hidden;position:relative">
                  <div style="position:absolute;height:100%;width:${Math.min(pctBar,100)}%;background:${w.inRBJ?barClr:'#94a3b8'};border-radius:99px;opacity:0.35"></div>
                  <div style="position:absolute;height:100%;width:${Math.min(pctD,100)}%;background:${w.inRBJ?'#0d9488':'#94a3b8'};border-radius:99px;opacity:0.8"></div>
                </div>
                <span style="font-size:11px;font-weight:700;color:${w.inRBJ?barClr:'var(--text-dim)'};min-width:34px;text-align:right">${pctBar.toFixed(1)}%</span>
              </div>
              <div style="font-size:10px;color:var(--text-dim);margin-top:2px;padding-left:2px">
                <span style="color:#2457a0">▬ GFMIS</span> &nbsp; <span style="color:#0d9488">▬ กันเงิน</span>
              </div>
            </td>
            <td style="padding:8px 10px;text-align:center">${rbjMark}</td>
          </tr>`;
        }).join('');

        // subtotal row A+B+C+D
        const rbjPct    = rbjAlloc > 0 ? (rbjPaid / rbjAlloc * 100) : 0;
        const rbjPctDS6 = rbjAlloc > 0 ? (rbjPaidDS6 / rbjAlloc * 100) : 0;
        const rbjClr = rbjPct >= target ? '#166534' : rbjPct >= target - 10 ? '#92400e' : '#991b1b';
        const rbjBg  = rbjPct >= target ? '#f0fdf4' : rbjPct >= target - 10 ? '#fffbeb' : '#fff5f5';

        if (walletTfoot) walletTfoot.innerHTML = `
          <tr style="border-top:2px solid var(--border);background:${rbjBg};font-weight:700">
            <td colspan="2" style="padding:10px 10px;color:${rbjClr}">รวม A+B+C+D (งบดำเนินงาน — รบจ.)</td>
            <td style="padding:10px 10px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:${rbjClr}">${fmt(rbjAlloc)}</td>
            <td style="padding:10px 10px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#2457a0">
              ${fmt(rbjPaid)}<div style="font-size:10px;color:${rbjClr};font-weight:400">${rbjPct.toFixed(1)}%</div>
            </td>
            <td style="padding:10px 10px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#0d9488">
              ${fmt(rbjPaidDS6)}<div style="font-size:10px;color:${rbjClr};font-weight:400">${rbjPctDS6.toFixed(1)}%</div>
            </td>
            <td colspan="2" style="padding:10px 10px;color:${rbjClr};font-size:15px;font-family:'IBM Plex Mono',monospace">
              ${rbjPct.toFixed(1)}% <span style="font-size:11px;font-weight:400">(เป้า ${target}%)</span>
            </td>
          </tr>`;

        // อัปเดต gauge
        if (rbjPctEl) { rbjPctEl.textContent = rbjPct.toFixed(1) + '%'; rbjPctEl.style.color = rbjClr; }
        if (rbjTgtEl) rbjTgtEl.textContent = target;
        if (rbjGauge) {
          const gaugeBorder = rbjPct >= target ? '#86efac' : rbjPct >= target-10 ? '#fde68a' : '#fca5a5';
          rbjGauge.style.borderColor = gaugeBorder;
          rbjGauge.style.background  = rbjBg;
          rbjGauge.style.color = rbjClr;
        }
      }

      // Group breakdown bars
      const gbEl = _el('exec-group-bars');
      if (gbEl) {
        gbEl.innerHTML = '';
        const groups = res.groupSummary || [];
        if (!groups.length) {
          gbEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px">ยังไม่มีข้อมูลสมุดกันเงิน DS6 สำหรับปีนี้</div>';
          return;
        }
        const maxPaid = Math.max(...groups.map(g => g.paid), 1);
        groups.forEach(g => {
          const w = (g.paid / maxPaid * 100).toFixed(1);
          const clr = g.alert === 'green' ? '#0d9488' : g.alert === 'yellow' ? '#d97706' : '#e11d48';
          gbEl.insertAdjacentHTML('beforeend', `
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:140px;font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0" title="${g.label}">${g.label}</div>
          <div style="flex:1;height:20px;background:#f1f5f9;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${w}%;background:${clr};border-radius:4px;display:flex;align-items:center;padding-left:6px;transition:width .6s;min-width:2px">
              <span style="font-size:10px;color:white;font-weight:600;white-space:nowrap">${fmt(g.paid)} (${g.paidPct}%)</span>
            </div>
          </div>
          <div style="font-size:11px;color:var(--text-dim);min-width:80px;text-align:right;font-family:'IBM Plex Mono',monospace">${fmt(g.allocated)}</div>
        </div>`);
        });
      }
    }

    function renderInvestment(data) {
      if (!data || !data.length) {
        document.getElementById('invest-section').style.display = 'none';
        return;
      }
      document.getElementById('invest-section').style.display = '';
      const totalAlloc = data.reduce((s, r) => s + r.allocated, 0);
      const totalPaid = data.reduce((s, r) => s + r.paid, 0);
      const overallPct = totalAlloc > 0 ? (totalPaid / totalAlloc * 100).toFixed(1) : 0;
      document.getElementById('invest-summary').innerHTML =
        `จัดสรร <b>${fmt(totalAlloc)}</b> | เบิกจ่าย <b>${fmt(totalPaid)}</b> | <b>${overallPct}%</b>`;
      const tbody = document.getElementById('invest-tbody');
      tbody.innerHTML = '';
      data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)">${r.id}</td>
      <td style="font-size:13px">${r.plan}</td>
      <td class="num">${fmt(r.allocated)}</td>
      <td class="num">${fmt(r.paid)}</td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${Math.min(r.pct, 100)}%;background:${r.pct >= 100 ? '#2457a0' : '#64748b'}"></div>
          </div>
          <span class="mini-bar-lbl">${r.pct}%</span>
        </div>
      </td>
      <td style="font-size:11px;color:var(--text-dim)">${r.lastUpdate}</td>`;
        tbody.appendChild(tr);
      });
    }

    // ════════════════════════════════════════════════
    //  TREND BARS — shared renderer for Panel 1 & Exec tab
    // ════════════════════════════════════════════════
    function renderTrendBars(containerId, monthlyTrend, target) {
      const el = document.getElementById(containerId);
      if (!el) return;
      if (!monthlyTrend || !monthlyTrend.length) {
        el.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:20px;text-align:center">ยังไม่มีข้อมูลแนวโน้มรายเดือน</div>';
        return;
      }
      el.innerHTML = '';
      const barH = 100;
      const maxPct = Math.max(...monthlyTrend.map(m => Math.max(m.paidCumPct || 0, m.targetCumPct || 0)), 20);
      monthlyTrend.forEach(m => {
        const isCur = m.isCurrent || false;
        const tgt  = m.targetCumPct != null ? m.targetCumPct : 0;
        const paid = m.paidCumPct || 0;
        const clr  = !m.isPast ? '#cbd5e1'
          : paid >= tgt ? '#0d9488'
          : paid >= tgt - 10 ? '#d97706' : '#e11d48';
        const tgtPx  = tgt  > 0 ? Math.round((tgt  / maxPct) * barH) : 0;
        const paidPx = paid > 0 ? Math.round((paid / maxPct) * barH) : 0;
        el.insertAdjacentHTML('beforeend', `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:48px;
             ${isCur ? 'background:#f5f3ff;border-radius:8px;padding:4px 2px' : ''}">
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:${clr};min-height:14px">
            ${m.isPast && paid > 0 ? paid.toFixed(0) + '%' : ''}
          </div>
          <div style="position:relative;width:32px;height:${barH}px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;overflow:hidden;flex-shrink:0">
            ${tgtPx > 0 ? `<div style="position:absolute;bottom:0;width:100%;height:${tgtPx}px;background:#e2e8f0;border-radius:4px;"></div>` : ''}
            <div style="position:absolute;bottom:0;width:100%;height:${paidPx}px;background:${clr};border-radius:4px;transition:height .6s;"></div>
          </div>
          <div style="font-size:11px;color:${isCur ? 'var(--navy)' : 'var(--text-dim)'};font-weight:${isCur ? 700 : 400}">${m.month}</div>
          <div style="font-size:9px;color:#94a3b8">${tgt > 0 ? tgt + '%' : ''}</div>
        </div>`);
      });
    }

    // ════════════════════════════════════════════════
    //  PANEL 2 — กระทบยอด GFMIS
    // ════════════════════════════════════════════════
    function renderReconPanel(res) {
      if (!res || !res.summary) return;
      const s = res.summary;
      const _el  = id => document.getElementById(id);
      const _set = (id, v) => { const e = _el(id); if (e) e.textContent = v; };

      // GFMIS paid (grandPaid = GFMIS A-F from DS2)
      _set('kpi-gfmis-paid', fmt(s.grandPaid));
      _set('kpi-gfmis-alloc', fmt(s.grandAlloc));

      // DS6 A-F paid (activityPaidTotal)
      _set('recon-ds6-paid', fmt(s.activityPaidTotal));

      // Diff
      const diff = Number(s.gfmisReconDiff || 0);
      _set('recon-diff-val', fmt(diff));
      const noteEl = _el('recon-diff-note');
      if (noteEl) {
        if (diff <= 1) {
          noteEl.innerHTML = '<span style="color:var(--green)"><i class="fas fa-check-circle"></i> ตรงกับ GFMIS ✓</span>';
        } else {
          const pct = s.grandPaid > 0 ? (diff / s.grandPaid * 100).toFixed(1) : '-';
          noteEl.innerHTML = `<span style="color:var(--rose)"><i class="fas fa-exclamation-triangle"></i> ต่างกัน ${pct}% — ตรวจสอบสถานะกันเงิน</span>`;
        }
      }

      // Summary list (right side card)
      const listEl = _el('recon-summary-list');
      if (listEl) {
        const items = [
          { label:'งบรวม (GFMIS grandAlloc)', val: fmt(s.grandAlloc), color:'var(--navy)' },
          { label:'เบิก GFMIS (A–F)', val: fmt(s.grandPaid), color:'#2457a0' },
          { label:'กันเงิน DS6 เบิกแล้ว (A–F)', val: fmt(s.activityPaidTotal), color:'#0d9488' },
          { label:'D — เบิกแทนกัน', val: fmt(s.reconcileTotal), color:'#d97706' },
          { label:'คงเหลือ', val: fmt(s.remaining), color:'var(--rose)' },
        ];
        listEl.innerHTML = items.map(it => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
            <span style="color:var(--text-dim)">${it.label}</span>
            <span style="font-family:'IBM Plex Mono',monospace;font-weight:700;color:${it.color}">${it.val}</span>
          </div>`).join('');
      }
    }

    // ════════════════════════════════════════════════
    //  PANEL 3 — ความก้าวหน้ายุทธศาสตร์
    // ════════════════════════════════════════════════
    function renderStrategicPanel(res) {
      if (!res || !res.summary) return;
      const s      = res.summary;
      const target = s.targetPct || 0;
      const wbMap  = {};
      (res.walletBreakdown || []).forEach(w => { wbMap[w.wtype] = w; });

      // A / B / C cards
      const abcEl = document.getElementById('strategic-abc-cards');
      if (abcEl) {
        const WDEF = {
          A: { label:'ยุทธศาสตร์กลุ่มงาน',   sub:'1.x — แผนงานเชิงกลยุทธ์',  color:'#2457a0', bg:'#eff6ff' },
          B: { label:'นโยบายกรม',             sub:'2.x — นโยบาย/โครงการพิเศษ', color:'#7c3aed', bg:'#f5f3ff' },
          C: { label:'ค่าใช้จ่ายพื้นฐาน',    sub:'3.x — งานประจำบังคับ',       color:'#0d9488', bg:'#f0fdfa' },
        };
        abcEl.innerHTML = Object.entries(WDEF).map(([k, def]) => {
          const w    = wbMap[k] || { alloc:0, paid:0, pct:0, paidDS6:0 };
          const pct  = w.pct  || 0;
          const pctD = w.pctDS6 || 0;
          const clr  = pct >= target ? 'var(--green)' : pct >= target-10 ? 'var(--amber)' : 'var(--rose)';
          return `
          <div style="background:var(--surface);border-radius:var(--radius);padding:20px 22px;
               box-shadow:var(--shadow);border:1px solid var(--border);border-top:4px solid ${def.color}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
              <div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                  <span style="background:${def.bg};color:${def.color};font-weight:800;font-size:13px;padding:3px 10px;border-radius:6px">Type ${k}</span>
                  <span style="font-size:13px;font-weight:700;color:var(--navy)">${def.label}</span>
                </div>
                <div style="font-size:11px;color:var(--text-dim)">${def.sub}</div>
              </div>
              <div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${clr}">${pct.toFixed(1)}%</div>
            </div>
            <!-- dual bar: GFMIS vs DS6 -->
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:3px">
                <span>GFMIS</span><span>${pct.toFixed(1)}%</span>
              </div>
              <div style="height:7px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:4px">
                <div style="height:100%;width:${Math.min(pct,100)}%;background:${def.color};opacity:.5;border-radius:99px;transition:width .8s"></div>
              </div>
              <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim);margin-bottom:3px">
                <span>กันเงิน DS6</span><span>${pctD.toFixed(1)}%</span>
              </div>
              <div style="height:7px;background:var(--border);border-radius:99px;overflow:hidden">
                <div style="height:100%;width:${Math.min(pctD,100)}%;background:${def.color};border-radius:99px;transition:width .8s"></div>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim)">
              <span>จัดสรร ${fmt(w.alloc)}</span>
              <span style="color:${def.color};font-weight:600">เบิก GFMIS ${fmt(w.paidGFMIS || 0)}</span>
            </div>
          </div>`;
        }).join('');
      }

      // Type D row
      const dW = wbMap['D'] || { alloc:0, paid:0, pct:0, paidDS6:0 };
      const dEl = id => document.getElementById(id);
      const dSet = (id, v) => { const e = dEl(id); if (e) e.textContent = v; };
      dSet('strat-d-paid', fmt(dW.paidDS6 || 0));
      dSet('strat-d-alloc', fmt(dW.alloc));
      dSet('strat-d-pct', (dW.pct || 0).toFixed(1) + '%');
      const dBar = dEl('strat-d-bar');
      if (dBar) dBar.style.width = Math.min(dW.pct || 0, 100) + '%';

      // Group bars (strat-group-bars)
      const gbEl = document.getElementById('strat-group-bars');
      if (gbEl) {
        gbEl.innerHTML = '';
        const groups = res.groupSummary || [];
        if (!groups.length) {
          gbEl.innerHTML = '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px">ยังไม่มีข้อมูลสมุดกันเงิน DS6</div>';
        } else {
          const maxPaid = Math.max(...groups.map(g => g.paid), 1);
          groups.forEach(g => {
            const w   = (g.paid / maxPaid * 100).toFixed(1);
            const clr = g.alert === 'green' ? '#0d9488' : g.alert === 'yellow' ? '#d97706' : '#e11d48';
            gbEl.insertAdjacentHTML('beforeend', `
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:140px;font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0" title="${g.label}">${g.label}</div>
              <div style="flex:1;height:20px;background:#f1f5f9;border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${w}%;background:${clr};border-radius:4px;display:flex;align-items:center;padding-left:6px;transition:width .6s;min-width:2px">
                  <span style="font-size:10px;color:white;font-weight:600;white-space:nowrap">${fmt(g.paid)} (${g.paidPct}%)</span>
                </div>
              </div>
              <div style="font-size:11px;color:var(--text-dim);min-width:80px;text-align:right;font-family:'IBM Plex Mono',monospace">${fmt(g.allocated)}</div>
            </div>`);
          });
        }
      }

      // Group chart (chart-group canvas) — reuse renderSimpleChart
      renderSimpleChart('chart-group', res.groupSummary || [], target);
    }

    // ════════════════════════════════════════════════
    //  CHARTS
    // ════════════════════════════════════════════════

    function renderSimpleChart(canvasId, data, target) {
      // แสดงข้อมูลเป็น div bars แทน Chart.js canvas
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const parent = canvas.parentElement;
      if (!parent) return;

      // ซ่อน canvas แล้วแสดง div bars แทน
      canvas.style.display = 'none';

      // ลบ bars เก่า
      const oldBars = parent.querySelector('.simple-bars');
      if (oldBars) oldBars.remove();

      const wrap = document.createElement('div');
      wrap.className = 'simple-bars';
      wrap.style.cssText = 'padding:8px 0';

      (data || []).slice(0, 8).forEach(d => {
        // สายบริหาร: ใช้ % เบิกจ่ายจริง (paidPct) ไม่ใช่ Pool_Pct ในคอลัมน์ pct
        const raw = (d.paidPct != null && !isNaN(d.paidPct)) ? Number(d.paidPct) : Number(d.pct || 0);
        const pct = Math.min(raw, 100);
        const color = pct >= target ? '#0d9488' : pct >= target - 10 ? '#d97706' : '#e11d48';
        const lbl = d.label || d.line || '';
        wrap.insertAdjacentHTML('beforeend', `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="width:110px;font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
             title="${lbl}">${lbl}</div>
        <div style="flex:1;height:18px;background:#f1f5f9;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width .6s;display:flex;align-items:center;padding:0 6px">
            <span style="font-size:10px;color:white;font-weight:600;white-space:nowrap">${pct.toFixed(1)}%</span>
          </div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);min-width:70px;text-align:right;font-family:'IBM Plex Mono',monospace">${fmt(d.allocated)}</div>
      </div>`);
      });

      // เส้นเป้าหมาย
      wrap.insertAdjacentHTML('beforeend',
        `<div style="font-size:11px;color:#2457a0;margin-top:4px">เส้นเป้าหมาย: ${target}%</div>`);
      parent.appendChild(wrap);
    }

    // ════════════════════════════════════════════════
    //  TABLES
    // ════════════════════════════════════════════════
    function renderGroupTable(data, target) {
      const tbody = document.getElementById('group-tbody');
      tbody.innerHTML = '';
      data.forEach(d => {
        const raw = (d.paidPct != null && !isNaN(d.paidPct)) ? Number(d.paidPct) : Number(d.pct || 0);
        const pct = +raw.toFixed(1);
        const alert = pct >= target ? 'green' : pct >= target - 10 ? 'yellow' : 'red';
        const tr = document.createElement('tr');
        tr.innerHTML = `
      <td><b>${d.label || d.line || '-'}</b></td>
      <td class="num">${fmt(d.allocated)}</td>
      <td class="num">${fmt(d.paid)}</td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${Math.min(pct, 100)}%;background:${alert === 'green' ? '#0d9488' : alert === 'yellow' ? '#d97706' : '#e11d48'}"></div>
          </div>
          <span class="mini-bar-lbl">${pct}%</span>
        </div>
      </td>
      <td>${alertBadge(alert, pct, target)}</td>`;
        tbody.appendChild(tr);
      });
    }

    let _detailRows = [];
    function renderDetailTable(rows) {
      _detailRows = rows;
      _renderDetailRows(rows);
    }

    function _matchBadge(matchStatus, ds6Paid, gfPaid) {
      if (matchStatus === 'none') return '<span style="font-size:11px;color:var(--text-dim)">—</span>';
      if (matchStatus === 'exact') return '<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#d1fae5;color:#065f46;font-weight:600">✅ ตรง</span>';
      if (matchStatus === 'near') {
        const diff = Math.abs(ds6Paid - gfPaid);
        return `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#fef9c3;color:#854d0e;font-weight:600" title="ต่าง ${fmt(diff)} บาท">⚠ ใกล้เคียง</span>`;
      }
      const diff = Math.abs(ds6Paid - gfPaid);
      return `<span style="font-size:11px;padding:2px 7px;border-radius:10px;background:#fee2e2;color:#991b1b;font-weight:600" title="ต่าง ${fmt(diff)} บาท">❌ ไม่ตรง</span>`;
    }

    function _renderDetailRows(rows) {
      const tbody = document.getElementById('detail-tbody');
      tbody.innerHTML = '';
      rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.dataset.alert = r.alert;
        const ds6Rem = r.ds6Remaining ?? 0;
        const remColor = ds6Rem < 0 ? '#e11d48' : ds6Rem === 0 ? 'var(--text-dim)' : '#0d9488';
        tr.innerHTML = `
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.plan}">${r.plan}</td>
      <td class="code-cell">
        <div style="display:flex;align-items:center;gap:5px">
          <span title="${r.code}" style="flex:1;overflow:hidden;text-overflow:ellipsis">${r.code}</span>
          <button data-code="${r.code}" onclick="openBudgetLedger(this.dataset.code)"
            title="เปิดสมุดคุมการเบิกจ่าย"
            style="flex-shrink:0;padding:2px 7px;font-size:11px;border:1px solid #bfdbfe;background:#eff6ff;color:#2457a0;border-radius:5px;cursor:pointer;font-family:'Sarabun',sans-serif;line-height:1.4">
            📒 สมุดคุม
          </button>
        </div>
      </td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-track">
            <div class="mini-bar-fill" style="width:${Math.min(r.pct, 100)}%;background:${r.alert === 'green' ? '#0d9488' : r.alert === 'yellow' ? '#d97706' : '#e11d48'}"></div>
          </div>
          <span class="mini-bar-lbl">${r.pct}%</span>
        </div>
      </td>
      <td class="num">${fmt(r.allocated)}</td>
      <td class="num">${fmt(r.paid)}</td>
      <td class="num" style="color:#2457a0">${fmt(r.ds6PaidOnline ?? 0)}</td>
      <td style="text-align:center">${_matchBadge(r.matchStatus, r.ds6PaidOnline ?? 0, r.paid)}</td>
      <td class="num" style="color:#0d9488">${fmt(r.ds6Reserved ?? 0)}</td>
      <td class="num" style="color:${remColor};font-weight:${ds6Rem < 0 ? '700' : '400'}">${fmt(ds6Rem)}</td>`;
        tbody.appendChild(tr);
      });
    }

    function filterTable() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const alert = document.getElementById('filter-alert').value;
      const rows = _detailRows.filter(r => {
        const match = !q || [r.plan, r.code].some(v => (v || '').toLowerCase().includes(q));
        const alertMatch = !alert || r.alert === alert;
        return match && alertMatch;
      });
      _renderDetailRows(rows);
    }

    function sortTable(col) {
      if (_sortCol === col) _sortDir *= -1;
      else { _sortCol = col; _sortDir = 1; }
      const sorted = [..._detailRows].sort((a, b) => {
        const av = a[col]; const bv = b[col];
        return typeof av === 'number' ? (av - bv) * _sortDir : String(av).localeCompare(String(bv)) * _sortDir;
      });
      _renderDetailRows(sorted);
    }

    function exportTableCSV() {
      if (!_detailRows.length) return;
      const headers = ['แผนงาน','รหัสงบ','%เบิกจ่าย','จัดสรร(GF)','เบิกจ่าย(GF)','เบิกออนไลน์(DS6)','ตรงกัน','กันเงิน+เบิก','คงเหลือกันเงิน'];
      const rows = _detailRows.map(r => [
        `"${(r.plan||'').replace(/"/g,'""')}"`,
        `"${(r.code||'').replace(/"/g,'""')}"`,
        r.pct, r.allocated, r.paid,
        r.ds6PaidOnline ?? 0,
        r.matchStatus === 'exact' ? 'ตรง' : r.matchStatus === 'near' ? 'ใกล้เคียง' : r.matchStatus === 'diff' ? 'ไม่ตรง' : '-',
        r.ds6Reserved ?? 0, r.ds6Remaining ?? 0,
      ]);
      let csv = '\uFEFF' + headers.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'budget_detail_export.csv';
      a.click();
    }

    //  GF_INPUT TAB — อัปเดต GFMIS รายวัน

    let _gfRows = []; // cache ข้อมูลจาก getGFInputRows

    function loadGFInput() {
      const msg = document.getElementById('gfinput-msg');
      msg.textContent = '⏳ กำลังโหลดข้อมูลจาก GF_Input...';
      msg.style.color = 'var(--text-dim)';
      showLoading('กำลังโหลดข้อมูล GF_Input...');
      google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          if (!res || !res.success) {
            msg.textContent = '❌ ' + (res && res.message ? res.message : 'โหลดไม่สำเร็จ');
            msg.style.color = 'var(--rose)';
            return;
          }
          _gfRows = res.rows || [];
          _renderGFInputTable(_gfRows);
          msg.textContent = `✅ โหลดสำเร็จ ${_gfRows.length} แผนงาน — แก้ไขช่อง PO วันนี้ และ เบิก วันนี้ แล้วกด บันทึก`;

        })

    function _renderGFInputTable(rows) {
      const tbody = document.getElementById('gfinput-tbody');
      const tfoot = document.getElementById('gfinput-tfoot');
      tbody.innerHTML = '';
      if (!rows || !rows.length) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-dim)">ไม่มีข้อมูล — ยังไม่มีแผนงานในปีงบนี้</td></tr>';
        tfoot.innerHTML = '';
        return;
      }
      let totAlloc = 0, totPO = 0, totPaid = 0, totRemain = 0;

      rows.forEach((r, idx) => {
        const uid = `gf_${idx}`;
        const remain = r.alloc - r.poNow - r.paidNow;
        totAlloc  += r.alloc;
        totPO     += r.poNow;
        totPaid   += r.paidNow;
        totRemain += remain;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:center;color:var(--text-dim)">${r.seq || (idx+1)}</td>
          <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.plan}">${r.plan}</td>
          <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim)">${r.code}</td>
          <td class="num">${fmt(r.alloc)}</td>
          <td class="num" style="color:var(--text-dim)">${fmt(r.poYest)}</td>
          <td class="num" style="color:var(--text-dim)">${fmt(r.paidYest)}</td>
          <td class="num">
            <input type="number" id="${uid}_po" value="${r.poNow}" min="0" step="0.01"
              data-row="${idx}" data-field="poNow"
              oninput="_recalcGFRow(${idx})"
              style="width:110px;padding:5px 8px;border:1px solid var(--amber);border-radius:6px;
                     font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right">
          </td>
          <td class="num">
            <input type="number" id="${uid}_paid" value="${r.paidNow}" min="0" step="0.01"
              data-row="${idx}" data-field="paidNow"
              oninput="_recalcGFRow(${idx})"
              style="width:110px;padding:5px 8px;border:1px solid var(--teal);border-radius:6px;
                     font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:right">
          </td>
          <td class="num" id="${uid}_remain" style="font-weight:600;color:${remain >= 0 ? 'var(--green)' : 'var(--rose)'}">${fmt(remain)}</td>`;
        tbody.appendChild(tr);
      });

      // tfoot summary row
      tfoot.innerHTML = `
        <tr style="background:var(--navy);color:#fff;font-weight:700">
          <td colspan="3" style="padding:10px 12px">รวมทั้งหมด</td>
          <td class="num" style="padding:10px 12px">${fmt(totAlloc)}</td>
          <td></td><td></td>
          <td class="num" id="gf-tot-po" style="padding:10px 12px">${fmt(totPO)}</td>
          <td class="num" id="gf-tot-paid" style="padding:10px 12px">${fmt(totPaid)}</td>
          <td class="num" id="gf-tot-remain" style="padding:10px 12px">${fmt(totRemain)}</td>
        </tr>`;
    }

    function _recalcGFRow(idx) {
      const uid = `gf_${idx}`;
      const r = _gfRows[idx];
      if (!r) return;
      const po   = parseFloat(document.getElementById(`${uid}_po`).value) || 0;
      const paid = parseFloat(document.getElementById(`${uid}_paid`).value) || 0;
      const remain = r.alloc - po - paid;
      const el = document.getElementById(`${uid}_remain`);
      if (el) {
        el.textContent = fmt(remain);
        el.style.color = remain >= 0 ? 'var(--green)' : 'var(--rose)';
      }
      // อัป totals
      let totPO = 0, totPaid = 0, totRemain = 0;
      _gfRows.forEach((row, i) => {
        const p  = parseFloat((document.getElementById(`gf_${i}_po`) || {value: row.poNow}).value) || 0;
        const pd = parseFloat((document.getElementById(`gf_${i}_paid`) || {value: row.paidNow}).value) || 0;
        totPO    += p;
        totPaid  += pd;
        totRemain+= row.alloc - p - pd;
      });
      const tpo = document.getElementById('gf-tot-po');
      const tp  = document.getElementById('gf-tot-paid');
      const tr  = document.getElementById('gf-tot-remain');
      if (tpo) tpo.textContent = fmt(totPO);
      if (tp)  tp.textContent  = fmt(totPaid);
      if (tr)  tr.textContent  = fmt(totRemain);
    }

    function saveGFInputData() {
      if (!_gfRows.length) { showError('กดโหลดข้อมูลก่อน'); return; }
      // เก็บค่าที่ user แก้ไข
      const updates = _gfRows.map((r, idx) => {
        const poEl   = document.getElementById(`gf_${idx}_po`);
        const paidEl = document.getElementById(`gf_${idx}_paid`);
        const poVal   = poEl   ? parseFloat(poEl.value)   : NaN;
        const paidVal = paidEl ? parseFloat(paidEl.value) : NaN;
        return {
          rowIndex:   r.rowIndex,
          gfRowIndex: r.gfRowIndex || 0,
          code:       r.code,
          poNow:   isNaN(poVal)   ? (r.poNow   || 0) : poVal,
          paidNow: isNaN(paidVal) ? (r.paidNow || 0) : paidVal,
        };
      });

      Swal.fire({
        title: 'ยืนยันบันทึกข้อมูล GFMIS?',
        html: `จะบันทึก <b>${updates.length}</b> แผนงาน เข้า GF_Input Sheet<br>และอัปเดต DS2_MasterBudget ทันที`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#0d9488',
        confirmButtonText: '✅ ยืนยัน',
        cancelButtonText: 'ยกเลิก'
      }).then(r => {
        if (!r.isConfirmed) return;
        showLoading('กำลังบันทึกข้อมูล...');
        google.script.run
          .withSuccessHandler(res => {
            hideLoading();
            if (!res || !res.success) { showError((res && res.message) || 'บันทึกไม่สำเร็จ'); return; }
            Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', html: res.message, timer: 3000, showConfirmButton: false });
            loadDashboard(_selectedYear); // รีเฟรช Dashboard ทันที
          })
          .withFailureHandler(err => { hideLoading(); showError(err.message || String(err)); })
          .saveGFInput(updates);
      });
    }

    function fmt(n) {
      if (n == null || isNaN(n)) return '-';
      return Number(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function alertBadge(alert, pct, target) {
      if (alert === 'green') return `<span class="badge badge-green">✅ ปกติ ${pct}%</span>`;
      if (alert === 'yellow') return `<span class="badge badge-yellow">🔸 ต้องติดตาม ${pct}%</span>`;
      return `<span class="badge badge-red">⚠ ต้องเร่งรัด ${pct}%</span>`;
    }

    function showError(msg) {
      Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: msg });
    }

    function setCrudMode(mode) {

        const ta = document.getElementById('crud-paste-area');
        if (ta && !ta.value) parsePasteForTransfer();

    // ════ PASTE MODE — parse + preview + bulk add ════
    function parsePasteForTransfer() {
      const raw = (document.getElementById('crud-paste-area')?.value || '').trim();
      const preview = document.getElementById('crud-paste-preview');
      const tbody   = document.getElementById('crud-paste-tbody');
      const countEl = document.getElementById('crud-paste-count');
      const errEl   = document.getElementById('crud-paste-error-msg');
      const confirmBtn = document.getElementById('crud-paste-confirm-btn');
      _pastePreviewItems = [];

      if (!raw) { if (preview) preview.style.display = 'none'; return; }

      const lines = raw.split(/\r?\n/).filter(l => l.trim());
      let okCount = 0, errCount = 0;
      const rows = lines.map((line, i) => {
        // รองรับ tab และ | และ , เป็น delimiter
        const cols = line.split(/\t|\s*\|\s*/).map(c => c.trim());
        // ถ้า 2 คอลัมน์: code + amount (ไม่มีชื่อ)
        // ถ้า 3 คอลัมน์: plan + code + amount
        let planName = '', budgetCode = '', amount = 0;
        if (cols.length >= 3) {
          planName   = cols[0];
          budgetCode = cols[1].replace(/\D/g, '');   // เหลือเฉพาะตัวเลข
          amount     = parseFloat(cols[2].replace(/[^0-9.]/g, '')) || 0;
        } else if (cols.length === 2) {
          budgetCode = cols[0].replace(/\D/g, '');
          amount     = parseFloat(cols[1].replace(/[^0-9.]/g, '')) || 0;
        } else {
          // 1 column — skip
          return { line: i+1, planName: '-', budgetCode: line, amount: 0, ok: false, err: 'รูปแบบไม่ถูกต้อง' };
        }
        const codeOk   = /^\d{10,20}$/.test(budgetCode);
        const amountOk = amount > 0;
        const ok = codeOk && amountOk;
        const err = !codeOk ? 'รหัสงบไม่ถูกต้อง' : (!amountOk ? 'จำนวนเงิน = 0' : '');
        if (ok) { okCount++; _pastePreviewItems.push({ planName, budgetCode, amount }); }
        else errCount++;
        return { line: i+1, planName, budgetCode, amount, ok, err };
      });

      if (preview) preview.style.display = '';
      if (countEl) countEl.textContent = `${okCount} รายการพร้อมเพิ่ม${errCount ? ` · ⚠ ${errCount} รายการมีข้อผิดพลาด` : ''}`;
      if (errEl) errEl.textContent = '';
      if (confirmBtn) confirmBtn.disabled = okCount === 0;
      if (tbody) {
        tbody.innerHTML = rows.map(r => `
          <tr style="border-bottom:1px solid var(--border);${r.ok ? '' : 'background:#fff5f5'}">
            <td style="padding:6px 8px;font-size:11px;color:var(--text-dim)">${r.line}</td>
            <td style="padding:6px 8px;font-size:12px;${r.ok?'':'color:#b91c1c'}">${r.planName || '—'}</td>
            <td style="padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:11px;${r.ok?'color:var(--text-dim)':'color:#b91c1c'}">${r.budgetCode || r.line}</td>
            <td style="padding:6px 8px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;${r.ok?'':'color:#b91c1c'}">
              ${r.ok ? r.amount.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}
            </td>
            <td style="padding:6px 8px;text-align:center;font-size:11px">
              ${r.ok ? '<span style="color:var(--green)">✓</span>' : `<span style="color:#b91c1c" title="${r.err}">✗ ${r.err}</span>`}
            </td>
          </tr>`).join('');
      }
    }

    function changeWalletType(sel, budgetCode, newWtype) {
      const prevWtype = sel.dataset.prev || newWtype;
      // optimistic UI: เปลี่ยนสีทันที + lock ระหว่าง save
      sel.style.background = _wtColors[newWtype] || '#f1f5f9';
      sel.disabled = true;
      const statusEl = _getOrCreateWtStatus(sel);
      statusEl.textContent = '⏳';

      google.script.run
        .withSuccessHandler(res => {
          sel.disabled = false;
          if (!res || !res.success) {
            // revert
            sel.value = prevWtype;
            sel.style.background = _wtColors[prevWtype] || '#f1f5f9';
            statusEl.textContent = '✗';
            statusEl.style.color = '#b91c1c';
            showError((res && res.message) || 'อัปเดตไม่สำเร็จ');
            return;
          }
          sel.dataset.prev = newWtype;
          statusEl.textContent = '✓';
          statusEl.style.color = '#0d9488';
          // ซ่อน ✓ หลัง 2 วิ
          setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 2000);
        })
        .withFailureHandler(err => {
          sel.disabled = false;
          sel.value = prevWtype;
          sel.style.background = _wtColors[prevWtype] || '#f1f5f9';
          statusEl.textContent = '✗';
          statusEl.style.color = '#b91c1c';
          showError(err.message || String(err));
        })
        .updateBudgetWalletType(budgetCode, newWtype, _selectedYear);

    /** กรองรายการโครงการตามกลุ่มงานที่เลือก (dependent dropdown) */
    function refreshActivityProjectOptions() {
      const group = (document.getElementById('ds6-act-group') && document.getElementById('ds6-act-group').value || '').trim();
      const rows = (_sourceRef && _sourceRef.sourceRows) ? _sourceRef.sourceRows : [];
      let projects = [];
      if (group) {
        const set = new Set();
        rows.forEach(r => {
          const g = (r.group || '').trim();
          const p = (r.project || '').trim();
          if (g === group && p) set.add(p);
        });
        projects = Array.from(set).sort((a, b) => a.localeCompare(b, 'th'));
      }
      const ph = group ? 'เลือกโครงการ' : 'เลือกกลุ่มงานก่อน';
      fillSelectOptions('ds6-act-project', projects, ph);
    }

    function onActivityGroupChange() {
      refreshActivityProjectOptions();
    }

    function onActivityProjectChange() {
      if (!_sourceRef || !_sourceRef.sourceRows) return;
      const proj = (document.getElementById('ds6-act-project').value || '').trim();
      if (!proj) return;
      const g = (document.getElementById('ds6-act-group').value || '').trim();
      const list = _sourceRef.sourceRows || [];
      const row = list.find(x => (x.project || '').trim() === proj && (!g || (x.group || '').trim() === g))
        || list.find(x => (x.project || '').trim() === proj);
      if (!row) return;
      if (row.actStatus) ensureSelectValue('ds6-act-status', row.actStatus);
      if (row.budgetType) ensureSelectValue('ds6-act-btype', row.budgetType);
      if (row.budgetCode) ensureSelectValue('ds6-act-budget-code', row.budgetCode);
    }

    function fillSelectOptions(id, options, placeholder) {
      const el = document.getElementById(id);
      if (!el) return;
      const seen = new Set();
      el.innerHTML = `<option value="">${placeholder || 'เลือก'}</option>`;
      (options || []).forEach(opt => {
        const isObj = opt && typeof opt === 'object';
        const val = isObj ? String(opt.value ?? '').trim() : String(opt).trim();
        const lbl = isObj ? String(opt.label ?? opt.value ?? '').trim() : val;
        if (!val || seen.has(val)) return;
        seen.add(val);
        el.insertAdjacentHTML('beforeend', `<option value="${val}">${lbl}</option>`);
      });
    }

    function ensureSelectValue(id, value) {
      const el = document.getElementById(id);
      if (!el) return;
      const v = String(value || '');
      if (!v) { el.value = ''; return; }
      if (![...el.options].some(o => o.value === v)) {
        el.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`);
      }
      el.value = v;
    }

    function exportLedgerCSV() {
      if (!_ledgerData) return;
      const d = _ledgerData;
      const rows = [
        [`ทะเบียนคุมการเบิกจ่าย เงินงบประมาณ ปี ${d.fiscalYear}`],
        [d.budgetName || ''],
        [`รหัสงบประมาณ: ${d.budgetCode}`],
        [],
        ['#','โครงการ','กิจกรรมดำเนินงาน','ระยะเวลา','งบประมาณ (บาท)',
         'กันเงิน-วันที่','กันเงิน-จำนวน','เบิก-วันที่','เบิก-จำนวน',
         'คงเหลือ','ผู้รับผิดชอบ','กลุ่มงาน'],
        ['','รวม','',`ปีงบ ${d.fiscalYear}`,d.alloc,'ปีงบ',d.totalBudget,'ปีงบ',d.totalPaid,'','',''],
      ];
      (d.items || []).forEach(it => {
        rows.push([
          it.no, it.project, it.activity, it.duration,
          it.budget, it.date, it.budget,
          it.paid > 0 ? it.date : '', it.paid > 0 ? it.paid : '',
          it.balance, it.person, it.group,
        ]);
      });
      const csv = rows.map(r =>
        r.map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(',')
      ).join('\n');
      const bom  = '\uFEFF';
      const blob = new Blob([bom + csv], { type:'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `สมุดคุม_${d.budgetCode}_${d.fiscalYear}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    const _STATUS_STYLES = {
      'เบิกจ่ายแล้ว': 'background:#d1fae5;color:#065f46;border-color:#6ee7b7',
      'กันเงิน':       'background:#ede9fe;color:#5b21b6;border-color:#c4b5fd',

    };
    function quickUpdateStatus(selectEl, activityId) {
      const newStatus = selectEl.value;
      // อัปเดต style ทันทีก่อน round-trip
      const style = _STATUS_STYLES[newStatus] || 'background:#f1f5f9;color:#475569;border-color:#cbd5e1';
      selectEl.setAttribute('style',
        `font-size:11px;font-weight:600;padding:3px 6px;border-radius:6px;border:1px solid;cursor:pointer;${style}`);
      selectEl.disabled = true;

      google.script.run
        .withSuccessHandler(res => {
          selectEl.disabled = false;
          if (!res || !res.success) {
            showError(res && res.message || 'อัปเดตสถานะไม่สำเร็จ');
            // คืนค่าเดิม
            loadActivities(_actPage);
            return;
          }
          // อัปเดต local cache เพื่อไม่ต้อง reload ทั้งหน้า
          const idx = _activities.findIndex(a => a.id === activityId);
          if (idx >= 0) _activities[idx].status = newStatus;
          // ถ้าสถานะที่กระทบยอดเงิน ให้ reload dashboard ด้วย
          if (newStatus === 'เบิกจ่ายแล้ว' || newStatus === 'ยกเลิก') {
            loadDashboard(_selectedYear);
          }
        })
        .withFailureHandler(err => {
          selectEl.disabled = false;
          showError(err.message || String(err));
          loadActivities(_actPage);
        })
        .quickUpdateActivityStatus(activityId, newStatus, _selectedYear);
    }

    function openDS6ActivityForm(activityId) {
      initActivitySourceOptions(() => {
        _activityEditId = typeof activityId === 'string' ? activityId : null;
        const isEdit = !!_activityEditId;
        let d = isEdit ? (_activities.find(x => x.id === _activityEditId) || {}) : {};
        if (isEdit && (d.project || '').trim() && !(d.group || '').trim() && _sourceRef && _sourceRef.sourceRows) {
          const hit = (_sourceRef.sourceRows || []).find(x => (x.project || '').trim() === (d.project || '').trim());
          if (hit && hit.group) d = { ...d, group: hit.group };
        }
        document.getElementById('ds6-act-form-title').textContent = isEdit ? 'แก้ไขรายการกันเงิน' : 'เพิ่มรายการกันเงิน';
        // วันที่: แก้ไข = ใช้ค่าเดิม / เพิ่มใหม่ = วันนี้
        const todayStr = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD
        document.getElementById('ds6-act-date').value = d.date || todayStr;
        ensureSelectValue('ds6-act-group', d.group || '');
        refreshActivityProjectOptions();
        ensureSelectValue('ds6-act-project', d.project || '');
        document.getElementById('ds6-act-name').value = d.activity || '';
        document.getElementById('ds6-act-budget').value = d.budget != null ? d.budget : '';
        document.getElementById('ds6-act-paid').value = d.paid != null ? d.paid : 0;
        ensureSelectValue('ds6-act-status', d.status || 'กันเงิน'); // default = กันเงิน
        ensureSelectValue('ds6-act-btype', d.btype || '');
        ensureSelectValue('ds6-act-budget-code', d.budgetCode || '');
        document.getElementById('ds6-act-person').value   = d.person   || '';
        document.getElementById('ds6-act-duration').value = d.duration || '';
        document.getElementById('modal-ds6-activity-form').style.display = 'flex';
      });
    }

    function saveDS6ActivityForm() {
      const budget = parseFloat(document.getElementById('ds6-act-budget').value || 0);
      const paid = parseFloat(document.getElementById('ds6-act-paid').value || 0);
      const payload = {
        date: document.getElementById('ds6-act-date').value,
        group: document.getElementById('ds6-act-group').value,
        project: document.getElementById('ds6-act-project').value,
        activity: document.getElementById('ds6-act-name').value,
        budget,
        paid,
        status: document.getElementById('ds6-act-status').value,
        btype: document.getElementById('ds6-act-btype').value,
        budgetCode: document.getElementById('ds6-act-budget-code').value,
        person:   (document.getElementById('ds6-act-person').value   || '').trim(),
        duration: (document.getElementById('ds6-act-duration').value || '').trim(),
      };
      if (!payload.activity) { showError('กรุณาระบุชื่อกิจกรรม'); return; }
      if (isNaN(budget)) { showError('กรุณาระบุงบประมาณ'); return; }
      if (isNaN(paid))   { showError('กรุณาระบุยอดเบิกจ่าย'); return; }
      showLoading('กำลังบันทึกรายการกันเงิน...');
      const runner = google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          if (!res || !res.success) { showError((res && res.message) || 'บันทึกไม่สำเร็จ'); return; }
          closeModal('modal-ds6-activity-form');
          loadActivities();
          loadDashboard(_selectedYear);
        })
        .withFailureHandler(err => { hideLoading(); showError(err.message || String(err)); });
      if (_activityEditId) runner.updateActivity(_activityEditId, payload, _selectedYear);
      else runner.createActivity(payload, _selectedYear);
    }

        text: 'ระบบจะเก็บประวัติการลบ (soft-delete)',
        input: 'text',
        inputPlaceholder: 'เหตุผลการลบ (ไม่บังคับ)',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ลบ',
        cancelButtonText: 'ยกเลิก'
      }).then(x => {
        if (!x.isConfirmed) return;
        const reason = x.value || '';
        showLoading('กำลังลบรายการ...');
        google.script.run
          .withSuccessHandler(res => {
            hideLoading();
            if (!res || !res.success) { showError((res && res.message) || 'ลบไม่สำเร็จ'); return; }
            loadActivities(_actPage);
            loadDashboard(_selectedYear);
          })
          .withFailureHandler(err => { hideLoading(); showError(err.message || String(err)); })
          .deleteActivity(activityId, _selectedYear, reason);
      });
    }
