        if (!r.isConfirmed) return;
        const btn = document.getElementById('btn-sync-source');
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังซิงค์...'; }
        showLoading('กำลังซิงค์ข้อมูล...');
        google.script.run
          .withSuccessHandler(res => {
            hideLoading();
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-magic"></i> ซิงค์จาก Source'; }
            if (!res || !res.success) { showError(res && res.message || 'เกิดข้อผิดพลาด'); return; }
            Swal.fire({
              icon: 'success',
              title: 'ซิงค์สำเร็จ',
              text: res.message || `อัปเดต ${res.updated} โครงการ`,
              timer: 2500,
              showConfirmButton: false,
            });
            // โหลดใหม่: mapping + projects
            loadAdminMappings();
            loadPlanData();
          })
          .withFailureHandler(err => {
            hideLoading();
            if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-magic"></i> ซิงค์จาก Source'; }
            showError(err.message || String(err));
          })
          .syncDS8GroupsFromSource(_selectedYear);
      });
    }

    function _renderMappingList(rows) {
      const el = document.getElementById('mapping-list');
      if (!el) return;
      if (!rows.length) {
        el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-dim)">ยังไม่มีข้อมูล — กดเพิ่มการเชื่อมโยง</div>';
        return;
      }

      // จัดกลุ่มตามสายบริหาร
      const grouped = {};
      rows.forEach(r => {
        const k = r.adminLine || '(ไม่ระบุ)';
        if (!grouped[k]) grouped[k] = [];
        grouped[k].push(r);
      });

      // index DS8 projects by group
      const projByGroup = {};
      (_projects || []).forEach(p => {
        const g = p.group || '';
        if (!projByGroup[g]) projByGroup[g] = [];
        projByGroup[g].push(p);
      });

      const colors = ['#eff6ff','#f5f3ff','#f0fdfa','#fffbeb','#f8fafc','#fef3c7'];
      let html = '';
      Object.entries(grouped).forEach(([adminLine, items], gi) => {
        const bg = colors[gi % colors.length];
        const totalProjects = items.reduce((s, r) => s + (projByGroup[r.group] || []).length, 0);
        html += `
        <div style="border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:${bg}">
            <div style="font-size:13px;font-weight:700;color:var(--navy)">
              <i class="fas fa-user-tie" style="margin-right:6px;opacity:.6"></i>${adminLine}
              <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:8px">${items.length} กลุ่มงาน · ${totalProjects} โครงการ (DS8)</span>
            </div>
            <button class="btn" style="padding:3px 10px;font-size:11px"
              onclick="openMappingForm({adminLine:'${adminLine.replace(/'/g,"\\'")}',rowIndex:0})">
              <i class="fas fa-plus"></i> เพิ่มกลุ่มงาน
            </button>
          </div>`;

        items.forEach(r => {
          const projs = projByGroup[r.group] || [];
          const groupLabel = r.group || '<span style="color:var(--text-dim)">—</span>';
          html += `
          <div style="border-top:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 20px 7px 36px;background:#fafafa">
              <div style="font-size:13px;font-weight:600;color:var(--navy)">
                <i class="fas fa-layer-group" style="font-size:10px;margin-right:6px;opacity:.5"></i>${groupLabel}
                <span style="font-size:11px;font-weight:400;color:var(--text-dim);margin-left:6px">${projs.length} โครงการ</span>
              </div>
              <div style="display:flex;gap:4px">
                <button class="btn" style="padding:2px 8px;font-size:11px"
                  onclick="openMappingForm(${JSON.stringify(r).replace(/"/g,'&quot;')})">แก้ไข</button>
                <button class="btn" style="padding:2px 8px;font-size:11px;color:#b91c1c;border-color:#fecaca;background:#fff5f5"
                  onclick="confirmDeleteMapping(${r.rowIndex},'${(r.group||adminLine).replace(/'/g,"\\'")}')">ลบ</button>
              </div>
            </div>
            ${projs.length ? `
            <div style="padding:4px 20px 8px 52px;display:flex;flex-wrap:wrap;gap:6px">
              ${projs.map(p => {
                const [pbg, pclr] = (_wtBadge[p.wtype]||'#f1f5f9:#64748b').split(':');
                return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:${pbg};border-radius:999px;font-size:11px;color:${pclr};font-weight:500">
                  <span style="font-weight:700">${p.wtype}</span> ${p.name}
                </span>`;
              }).join('')}
            </div>` : `<div style="padding:4px 52px 8px;font-size:11px;color:var(--text-dim)">ยังไม่มีโครงการใน DS8 สำหรับกลุ่มนี้</div>`}
          </div>`;
        });

        html += '</div>';
      });
      el.innerHTML = html;
    }

    function openMappingForm(data) {
      const isEdit = data && data.rowIndex >= 2;
      document.getElementById('mapping-modal-title').textContent = isEdit ? 'แก้ไขการเชื่อมโยง' : 'เพิ่มการเชื่อมโยง';
      document.getElementById('mapping-row-index').value = (data && data.rowIndex) ? data.rowIndex : 0;
      document.getElementById('mapping-admin-line').value = (data && data.adminLine) ? data.adminLine : '';
      document.getElementById('mapping-group').value = (data && data.group) ? data.group : '';

      // เติม datalist จาก existing data
      const adminLines = [...new Set(_mappingRows.map(r => r.adminLine).filter(Boolean))];
      const groups = [...new Set(_mappingRows.map(r => r.group).filter(Boolean))];
      document.getElementById('mapping-admin-list').innerHTML = adminLines.map(v => `<option value="${v}">`).join('');
      document.getElementById('mapping-group-list').innerHTML = groups.map(v => `<option value="${v}">`).join('');

      document.getElementById('modal-mapping').style.display = 'flex';
    }

    function closeMappingForm() {
      document.getElementById('modal-mapping').style.display = 'none';
    }

    function saveMappingForm() {
      const payload = {
        rowIndex:  parseInt(document.getElementById('mapping-row-index').value) || 0,
        adminLine: document.getElementById('mapping-admin-line').value.trim(),
        group:     document.getElementById('mapping-group').value.trim(),
      };
      if (!payload.adminLine) { showError('กรุณาระบุสายบริหาร'); return; }
      showLoading('กำลังบันทึก...');
      google.script.run
        .withSuccessHandler(res => {
          hideLoading();
          if (!res || !res.success) { showError(res && res.message); return; }
          closeMappingForm();
          loadAdminMappings();
          // รีเซ็ต sourceRef เพื่อให้ dropdown กันเงินโหลดใหม่
          _sourceRef = null;
        })
        .withFailureHandler(err => { hideLoading(); showError(err.message); })
        .saveAdminLineMapping(payload);
    }

    function confirmDeleteMapping(rowIndex, label) {
      Swal.fire({
        title: `ลบ "${label}"?`,
        text: 'การเชื่อมโยงนี้จะถูกลบออกจาก source sheet',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#e11d48',
        confirmButtonText: 'ลบ',
        cancelButtonText: 'ยกเลิก',
      }).then(r => {
        if (!r.isConfirmed) return;
        showLoading('กำลังลบ...');
        google.script.run
          .withSuccessHandler(res => {
            hideLoading();
            if (!res || !res.success) { showError(res && res.message); return; }
            loadAdminMappings();
            _sourceRef = null;
          })
          .withFailureHandler(err => { hideLoading(); showError(err.message); })
          .deleteAdminLineMapping(rowIndex);
      });
    }

    // ════════════════════════════════════════════════
    //  DS8 PROJECTS — Module 2
    // ════════════════════════════════════════════════
    let _projects      = [];
    let _planActivities = [];  // all DS9 for current FY
    let _ds6ByProject  = {};   // DS6 totals grouped by project name (DS9↔DS6 link)
    const _wtBadge  = { A:'#eff6ff:#2457a0', B:'#f5f3ff:#7c3aed', C:'#f0fdfa:#0d9488', D:'#fffbeb:#d97706' };
    const _wtBorder = { A:'#bfdbfe', B:'#ddd6fe', C:'#99f6e4', D:'#fde68a' };
    const _MONTHS   = ['ต.ค.','พ.ย.','ธ.ค.','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.'];
    const _TARGET_PCT = [8,16,24,32,40,50,58,66,74,82,90,100];

    const _statusStyle = {
      'ยังไม่เริ่ม':    '#f1f5f9:#64748b',
      'รอดำเนินการ':    '#fffbeb:#d97706',
      'กำลังดำเนินการ': '#eff6ff:#2457a0',
      'เสร็จสิ้น':      '#f0fdf4:#16a34a',
      'ยกเลิก':         '#fff1f2:#e11d48',
    };

    // โหลด DS8 + DS9 พร้อมกัน แล้ว render ทุกอย่าง
    function loadPlanData() {
      google.script.run
        .withSuccessHandler(pRes => {
          if (!pRes || !pRes.success) return;
          _projects = pRes.rows || [];
          google.script.run
            .withSuccessHandler(aRes => {
              _planActivities = (aRes && aRes.rows) || [];
              google.script.run
                .withSuccessHandler(d6Res => {
                  _ds6ByProject = (d6Res && d6Res.success) ? (d6Res.byProject || {}) : {};
                  _renderAll();
                })
                .withFailureHandler(() => { _ds6ByProject = {}; _renderAll(); })
                .getDS6SummaryByProject(_selectedYear);
            })
            .withFailureHandler(err => { _planActivities = []; _ds6ByProject = {}; _renderAll(); })
            .getActivitiesByYear(_selectedYear);
        })
        .withFailureHandler(err => console.error('loadPlanData:', err.message))
        .getProjects(_selectedYear);
    }

    function loadProjects() { loadPlanData(); }  // alias ที่ปุ่มรีเฟรชใช้

    function _renderAll() {
      _renderProjectKpi(_projects);
      _renderGanttChart(_projects, _planActivities);
      _renderProjectTable(_projects, _planActivities);
      _renderMappingList(_mappingRows);
      const meta = document.getElementById('proj-meta');
      if (meta) meta.textContent = `${_projects.length} โครงการ · รวม ${fmt(_projects.reduce((s,r)=>s+r.budget,0))} บาท`;
      const planMeta = document.getElementById('plan-meta');
      if (planMeta) planMeta.textContent = `ปีงบประมาณ ${_selectedYear} · ${_projects.length} โครงการ · ${_planActivities.length} กิจกรรม`;
    }

    // ── KPI strip A/B/C/D ────────────────────────────────────────
    function _renderProjectKpi(rows) {
      const el = document.getElementById('proj-kpi');
      if (!el) return;
      const byType = { A:0, B:0, C:0, D:0 };
      const counts = { A:0, B:0, C:0, D:0 };
      rows.forEach(r => {
        if (byType[r.wtype] != null) { byType[r.wtype] += r.budget; counts[r.wtype]++; }
      });
      const totalABC = (byType.A + byType.B + byType.C) || 1;
      const labels = { A:'A ยุทธศาสตร์', B:'B นโยบาย', C:'C พื้นฐาน', D:'D ตามสิทธิ์' };
      el.innerHTML = ['A','B','C','D'].map(k => {
        const [bg, clr] = (_wtBadge[k]||'#f1f5f9:#64748b').split(':');
        const sub = k === 'D'
          ? `${counts[k]} โครงการ · แสดงเฉยๆ`
          : `${counts[k]} โครงการ · ${(byType[k]/totalABC*100).toFixed(1)}% ของ ABC`;
        return `<div style="padding:12px 16px;background:${bg};border-right:1px solid var(--border)">
          <div style="font-size:11px;color:${clr};font-weight:600">${labels[k]}</div>
          <div style="font-size:18px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${clr}">${fmt(byType[k])}</div>
          <div style="font-size:10px;color:${clr};opacity:.8">${sub}</div>
        </div>`;
      }).join('');
    }

    // ── Gantt Chart (DS9-based) ───────────────────────────────────
    function _renderGanttChart(projects, activities) {
      const wrap = document.getElementById('gantt-wrap');
      if (!wrap) return;
      if (!projects.length) {
        wrap.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text-dim)">ยังไม่มีโครงการ — กดเพิ่มโครงการ</div>';
        return;
      }

      // group activities by projectId
      const actByProj = {};
      (activities || []).forEach(a => {
        if (!actByProj[a.projectId]) actByProj[a.projectId] = [];
        actByProj[a.projectId].push(a);
      });

      // sum monthly budget per project from DS9 (non-cancelled)
      function projMonths(pid) {
        const m = Array(12).fill(0);
        (actByProj[pid] || []).forEach(a => {
          if (a.status === 'ยกเลิก') return;
          if (a.month != null && a.month >= 0 && a.month < 12) m[a.month] += a.budget;
        });
        return m;
      }

      // totals
      const monthTotals = Array(12).fill(0);
      const totalBudget = projects.reduce((s,r) => s + r.budget, 0) || 1;
      projects.forEach(p => {
        const pm = projMonths(p.id);
        pm.forEach((v,i) => { monthTotals[i] += v; });
      });
      const grandTotal = monthTotals.reduce((s,v) => s+v, 0);
      let cum = 0;
      const cumPct = monthTotals.map(v => { cum += v; return (cum/totalBudget*100); });

      const sorted = [...projects].sort((a,b) => (a.wtype||'').localeCompare(b.wtype||'') || a.name.localeCompare(b.name));

      const TH = `style="padding:6px 8px;white-space:nowrap;font-size:11px;color:var(--text-dim);font-weight:600;border-bottom:2px solid var(--border);background:#f8fafc;text-align:center"`;
      let html = `<table style="width:100%;border-collapse:collapse;font-size:12px;min-width:900px">
        <thead><tr>
          <th style="padding:6px 12px;text-align:left;font-size:11px;color:var(--text-dim);font-weight:600;border-bottom:2px solid var(--border);background:#f8fafc;min-width:200px">โครงการ / กิจกรรม</th>
          <th ${TH} style="width:36px">ประเภท</th>
          <th ${TH} style="width:80px">กิจกรรม</th>
          ${_MONTHS.map((m,i) => `<th ${TH} style="min-width:62px">${m}<div style="font-size:9px;color:#94a3b8">เป้า ${_TARGET_PCT[i]}%</div></th>`).join('')}
          <th ${TH} style="padding-right:14px">รวม</th>
        </tr></thead>
        <tbody>`;

      sorted.forEach(proj => {
        const [bg, clr] = (_wtBadge[proj.wtype]||'#f1f5f9:#64748b').split(':');
        const border     = _wtBorder[proj.wtype] || '#e2e8f0';
        const pm         = projMonths(proj.id);
        const rowTotal   = pm.reduce((s,v) => s+v, 0);
        const acts       = actByProj[proj.id] || [];
        const actCount   = acts.length;
        const projId     = proj.id.replace(/'/g, "\\'");

        // Project row
        html += `<tr style="border-top:2px solid var(--border);background:${bg}" class="gantt-proj-row"
                   onclick="_toggleActRows('${projId}')" style="cursor:pointer">
          <td style="padding:7px 12px;font-weight:700;color:${clr};cursor:pointer">
            <i class="fas fa-chevron-right" id="chevron-${projId}" style="font-size:9px;margin-right:6px;transition:.2s"></i>
            ${proj.name}
          </td>
          <td style="text-align:center;padding:4px">
            <span style="font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;background:${clr}22;color:${clr}">${proj.wtype}</span>
          </td>
          <td style="text-align:center;padding:4px">
            <button class="btn" style="padding:2px 8px;font-size:10px;background:${clr}22;border-color:${border};color:${clr}"
              onclick="event.stopPropagation();openActivityPanel('${projId}')">
              ${actCount} กิจกรรม
            </button>
          </td>
          ${pm.map(v => {
            if (!v) return `<td style="padding:4px 6px;text-align:center;color:#cbd5e1;font-size:11px">—</td>`;
            return `<td style="padding:4px 6px;text-align:right;background:${bg};border-left:2px solid ${border};font-family:'IBM Plex Mono',monospace;font-size:11px;color:${clr};font-weight:600">${v>=1000?(v/1000).toFixed(0)+'K':v}</td>`;
          }).join('')}
          <td style="padding:4px 14px 4px 6px;text-align:right;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${clr}">${rowTotal ? fmt(rowTotal) : '<span style="opacity:.4">—</span>'}</td>
        </tr>`;

        // Activity sub-rows (hidden by default)
        acts.forEach(a => {
          const st = a.status || 'แผน';
          const [stBg, stClr] = (_statusStyle[st]||'#f1f5f9:#64748b').split(':');
          const isCancel = st === 'ยกเลิก';
          const isMove   = a.origMonth != null && a.origMonth !== a.month;
          const monthLabel = a.month != null ? _MONTHS[a.month] : '—';
          html += `<tr class="gantt-act-row gantt-act-${projId}" style="display:none;border-top:1px solid var(--border)98;background:#fafafa">
            <td style="padding:5px 12px 5px 36px;font-size:12px;${isCancel?'text-decoration:line-through;color:var(--text-dim)':''}">
              ${isMove ? '<span style="font-size:9px;background:#fef3c7;color:#d97706;padding:1px 4px;border-radius:3px;margin-right:4px">เลื่อน</span>' : ''}
              ${a.name}
              ${a.meetingDate ? `<span style="font-size:10px;color:var(--text-dim);margin-left:6px"><i class="fas fa-calendar-day"></i> ${a.meetingDate}</span>` : ''}
            </td>
            <td></td>
            <td style="text-align:center;padding:4px">
              <span style="font-size:10px;padding:1px 6px;border-radius:999px;background:${stBg};color:${stClr}">${st}</span>
            </td>
            ${Array(12).fill(0).map((_,mi) => {
              if (a.month !== mi) return `<td style="padding:4px 6px;text-align:center;color:#e2e8f0;font-size:10px">·</td>`;
              return `<td style="padding:4px 6px;text-align:right;background:${isCancel?'#fff1f2':bg}33;border-left:2px solid ${isCancel?'#fecaca':border};font-family:'IBM Plex Mono',monospace;font-size:11px;color:${isCancel?'#e11d48':clr};${isCancel?'text-decoration:line-through':''}">${fmt(a.budget)}</td>`;
            }).join('')}
            <td style="padding:4px 14px 4px 6px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;${isCancel?'color:#e11d48;text-decoration:line-through':''}">${fmt(a.budget)}</td>
          </tr>`;
        });
      });

      // Monthly totals row
      html += `<tr style="border-top:2px solid var(--border);background:#f8fafc;font-weight:700">
        <td style="padding:6px 12px;font-size:11px;color:var(--text-dim)" colspan="3">รวมรายเดือน (DS9)</td>
        ${monthTotals.map(v => `<td style="padding:4px 6px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px">${v?fmt(v):''}</td>`).join('')}
        <td style="padding:4px 14px 4px 6px;text-align:right;font-family:'IBM Plex Mono',monospace">${fmt(grandTotal)}</td>
      </tr>`;

      // Cumulative % row
      html += `<tr style="background:#f1f5f9">
        <td style="padding:4px 12px;font-size:10px;color:var(--text-dim)" colspan="3">% สะสม vs เป้า</td>
        ${cumPct.map((pct,i) => {
          const diff = pct - _TARGET_PCT[i];
          const c = diff >= 0 ? '#16a34a' : diff >= -5 ? '#d97706' : '#dc2626';
          return `<td style="padding:4px 6px;text-align:center;font-size:10px;font-weight:600;color:${c}">${pct.toFixed(0)}%</td>`;
        }).join('')}
        <td></td>
      </tr></tbody></table>`;

      wrap.innerHTML = html;
    }

    function _toggleActRows(projId) {
      const rows = document.querySelectorAll('.gantt-act-' + projId);
      const chevron = document.getElementById('chevron-' + projId);
      const isOpen = rows.length && rows[0].style.display !== 'none';
      rows.forEach(r => { r.style.display = isOpen ? 'none' : ''; });
      if (chevron) chevron.style.transform = isOpen ? '' : 'rotate(90deg)';
    }

    // ── Project Table ─────────────────────────────────────────────
    function _renderProjectTable(rows, acts) {
      const tbody = document.getElementById('proj-tbody');
      if (!tbody) return;
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text-dim)">ยังไม่มีโครงการ — กดเพิ่มโครงการ</td></tr>';
        return;
      }
      // count activities per project
      const actCount = {};
      (acts || []).forEach(a => { actCount[a.projectId] = (actCount[a.projectId]||0) + 1; });

      const sorted = [...rows].sort((a,b) => (a.wtype||'').localeCompare(b.wtype||'') || a.name.localeCompare(b.name));
      tbody.innerHTML = sorted.map((r, i) => {
        const [bg, clr] = (_wtBadge[r.wtype]||'#f1f5f9:#64748b').split(':');
        const stStyle    = (_statusStyle[r.status]||'#f1f5f9:#64748b').split(':');
        const monthLabel = r.startMonth != null ? _MONTHS[r.startMonth] : '—';
        const nAct       = actCount[r.id] || 0;
        const pid        = r.id.replace(/'/g,"\\'");
        return `<tr>
          <td style="text-align:center;color:var(--text-dim)">${i+1}</td>
          <td style="font-weight:500;max-width:180px">${r.name}</td>
          <td style="color:var(--text-dim);font-size:12px">${r.adminLine||'—'}</td>
          <td style="color:var(--text-dim);font-size:12px">${r.group||'—'}</td>
          <td style="text-align:center">
            <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:${bg};color:${clr}">${r.wtype}</span>

    function _buildMonthsGrid(mArr) {
      const grid = document.getElementById('proj-months-grid');
      if (!grid) return;
      grid.innerHTML = _MONTHS.map((label, i) => `
        <div>
          <label style="font-size:10px;color:var(--text-dim);display:block;margin-bottom:3px">${label}</label>
          <input type="number" id="proj-m${i}" class="input-field" style="padding:5px 8px;font-size:12px"
            value="${mArr ? (mArr[i]||0) : 0}" min="0" step="0.01" oninput="_updateMonthSum()">
        </div>`).join('');
      _updateMonthSum();
    }

    function _updateMonthSum() {
      let sum = 0;
      for (let i = 0; i < 12; i++) {
        const el = document.getElementById('proj-m' + i);
        if (el) sum += parseFloat(el.value) || 0;
      }
      const lbl = document.getElementById('proj-month-sum-label');
      if (lbl) lbl.textContent = `รวมรายเดือน: ${fmt(sum)} บาท`;
    }

    function autoDistributeBudget() {
      const total = parseFloat(document.getElementById('proj-budget').value) || 0;
      if (!total) return;
      const sm = document.getElementById('proj-start-month').value;
      const startIdx = sm !== '' ? parseInt(sm) : 0;
      const remaining = 12 - startIdx;
      const base = Math.floor(total / remaining);
      const extra = Math.round(total - base * remaining);
      for (let i = 0; i < 12; i++) {
        const el = document.getElementById('proj-m' + i);
        if (!el) continue;
        if (i < startIdx) { el.value = 0; continue; }
        el.value = (i === startIdx) ? (base + extra) : base;
      }
      _updateMonthSum();
    }

    function _renderActivityPanel(projectId) {
      const acts = _planActivities.filter(a => a.projectId === projectId);
      const tbody = document.getElementById('act-panel-tbody');
      if (!tbody) return;

      // DS9 plan totals
      const ds9Budget = acts.filter(a=>a.status!=='ยกเลิก').reduce((s,a)=>s+a.budget,0);

      // DS6 actuals — match by project name
      const proj = _projects.find(p => p.id === projectId);
      const projName = proj ? proj.name : '';
      const ds6 = _ds6ByProject[projName] || { budget: 0, paid: 0, count: 0 };
      const ds6Diff = ds9Budget - ds6.budget;
      const ds6Pct  = ds9Budget > 0 ? Math.round(ds6.budget / ds9Budget * 100) : 0;

      // summary line
      const summary = document.getElementById('act-panel-summary');
      if (summary) {
        const byStatus = {};
        acts.forEach(a => { byStatus[a.status] = (byStatus[a.status]||0)+1; });
        summary.textContent = `DS9: ${acts.length} กิจกรรม · แผนรวม ${fmt(ds9Budget)} บาท · ` +
          Object.entries(byStatus).map(([k,v])=>`${k} ${v}`).join(' · ');
      }

      // DS6 comparison bar (inject/replace after summary)
      const panelHeader = summary && summary.closest('.modal-header');
      let ds6Bar = document.getElementById('act-panel-ds6-bar');
      if (!ds6Bar && panelHeader) {
        ds6Bar = document.createElement('div');
        ds6Bar.id = 'act-panel-ds6-bar';
        ds6Bar.style.cssText = 'padding:8px 20px;background:#f8fafc;border-top:1px solid var(--border);font-size:12px;display:flex;gap:20px;align-items:center;flex-wrap:wrap';
        panelHeader.after(ds6Bar);
      }
      if (ds6Bar) {
        const barClr = ds6Pct >= 80 ? '#16a34a' : ds6Pct >= 40 ? '#d97706' : '#64748b';
        const diffLabel = ds6Diff >= 0
          ? `<span style="color:#16a34a">คงเหลือ ${fmt(ds6Diff)}</span>`
          : `<span style="color:#e11d48">เกินแผน ${fmt(Math.abs(ds6Diff))}</span>`;
        ds6Bar.innerHTML = `
          <span style="font-weight:600;color:var(--navy)"><i class="fas fa-link" style="margin-right:5px;opacity:.5"></i>DS6 กันเงินรายวัน</span>
          <span>กันเงินแล้ว <strong style="color:${barClr}">${fmt(ds6.budget)}</strong> บาท
            <span style="color:var(--text-dim)">(${ds6.count} รายการ)</span></span>
          <span>เบิกแล้ว <strong>${fmt(ds6.paid)}</strong> บาท</span>
          <span>${diffLabel} จากแผน DS9</span>
          <span style="color:var(--text-dim)">${ds6Pct}% ของแผน</span>
          ${!projName ? '<span style="color:#e11d48;font-size:11px"><i class="fas fa-exclamation-triangle"></i> ชื่อโครงการใน DS6 ต้องตรงกับ DS8 ถึงจะ link ได้</span>' : ''}`;
      }

      if (!acts.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-dim)">
          ยังไม่มีกิจกรรม — กดเพิ่มกิจกรรม</td></tr>`;
        return;
      }

      const sorted = [...acts].sort((a,b) => (a.month??99) - (b.month??99));
      tbody.innerHTML = sorted.map(a => {
        const [stBg, stClr] = (_statusStyle[a.status]||'#f1f5f9:#64748b').split(':');
        const isCancel = a.status === 'ยกเลิก';
        const isMove   = a.origMonth != null && a.origMonth !== a.month;
        const mLabel   = a.month != null ? _MONTHS[a.month] : '—';
        const origLbl  = isMove ? ` <span style="font-size:9px;background:#fef3c7;color:#d97706;padding:1px 4px;border-radius:3px">(เดิม ${_MONTHS[a.origMonth]})</span>` : '';
        return `<tr style="border-top:1px solid var(--border);${isCancel?'opacity:.55':''}">
          <td style="padding:7px 12px;font-size:13px;${isCancel?'text-decoration:line-through':''}">${a.name}</td>
          <td style="text-align:center;font-size:12px">${mLabel}${origLbl}</td>
          <td style="text-align:center;font-size:12px">${a.meetingDate||'—'}</td>
          <td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px">${fmt(a.budget)}</td>
          <td style="text-align:center">
            <span style="font-size:10px;padding:2px 8px;border-radius:999px;background:${stBg};color:${stClr}">${a.status}</span>
          </td>
          <td style="text-align:center;font-size:11px;color:var(--text-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${a.note||''}">${a.note||'—'}</td>
          <td style="text-align:center;padding:4px 8px">
            <div style="display:flex;gap:3px;justify-content:center">
              <button class="btn" style="padding:2px 7px;font-size:11px"
                onclick="openActivityForm(${JSON.stringify(a).replace(/"/g,'&quot;')})"><i class="fas fa-edit"></i></button>
              <button class="btn" style="padding:2px 7px;font-size:11px;color:#b91c1c;border-color:#fecaca;background:#fff5f5"
                onclick="confirmDeleteActivity('${a.id}','${a.name.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

      }).then(res => {
        if (!res.isConfirmed) return;
        showLoading('กำลังลบ...');
        google.script.run
          .withSuccessHandler(r => {
            hideLoading();
            if (r.success) { loadDashboard(); Swal.fire({ icon:'success', title:'ลบสำเร็จ', timer:1500, showConfirmButton:false }); }
            else showError(r.message);
          })
          .withFailureHandler(err => { hideLoading(); showError(err.message || String(err)); })
          .deleteAdminLine(id);
      });
    }

    // Auto-load dashboard — ใช้ setTimeout เพราะ GAS iframe ต้องการเวลา init
    // DOMContentLoaded อาจ fire ก่อนที่ google.script.run จะพร้อม
    setTimeout(function () {
      if (typeof loadDashboard === 'function') {
        loadDashboard();
      }
    }, 800);

  </script>
